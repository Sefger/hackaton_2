version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  index-service:
    build:
      context: .
      dockerfile: index-service/Dockerfile
    container_name: index-service
    ports:
      - "8081:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - RUST_LOG=info
    depends_on:
      - qdrant
    restart: unless-stopped

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: search-service
    ports:
      - "8082:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - RUST_LOG=info
      # Заглушки для локальной разработки
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=test_collection
      - EMBEDDINGS_DENSE_URL=http://placeholder
      - RERANKER_URL=http://placeholder
      - API_KEY=dummy
      - QDRANT_DENSE_VECTOR_NAME=dense
      - QDRANT_SPARSE_VECTOR_NAME=sparse
    depends_on:
      - qdrant
      - index-service
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - index-service
      - search-service
    restart: unless-stopped

volumes:
  qdrant_data: